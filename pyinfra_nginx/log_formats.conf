##
# Logging Settings
##

map $remote_addr $ip_anonym1 {
 default 0.0.0;
 "~^(\d+\.\d+\.\d+)\.\d+$" $1;
 "~^([^:]+:[^:]+):" $1;
}

map $remote_addr $ip_anonym2 {
 default .0;
 "~^(\d+\.\d+\.\d+)\.\d+$" .0;
 "~^([^:]+:[^:]+):" ::;
}

map $ip_anonym1$ip_anonym2 $ip_anonymized {
 default 0.0.0.0;
 "~^(.*)$" $1;
}

log_format anonymized '$host $ip_anonymized - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';
log_format minimal '$host [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';

access_log /var/log/nginx/access.log anonymized;
